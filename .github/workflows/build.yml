# Builds the npm tarball and runs lint/format/typecheck.
#
# On push to main / release branches, the tarball is uploaded as an artifact
# named after the commit SHA; craft's npm target (see .craft.yml) downloads it
# for the release commit and publishes it to npm.
#
# On pull requests the same build runs as a check, but the artifact is not
# archived — PRs only need to prove the package builds, not produce a release
# tarball.

name: Build

on:
  push:
    branches: ["main", "release/*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run fmt:check

      - name: Typecheck
        run: pnpm run check

      - name: Pack npm tarball
        run: pnpm pack --pack-destination dist

      - name: Archive artifacts
        # Release artifacts are only needed off push builds; PRs just build.
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.sha }}
          path: ${{ github.workspace }}/dist/*.tgz
